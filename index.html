<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Conversor de archivos gratuito online. Convierte imágenes a PNG, JPG, WebP, PDF, TXT y más. Fácil, rápido y sin instalar nada. Conversión de archivos desde tu navegador.">
    <meta name="keywords" content="conversor de archivos, convertir archivos, conversor online, convertir imagen, convertir a PDF, convertir PNG, convertir JPG, conversor gratis, herramienta online">
    <meta name="author" content="">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="Conversor de Archivos - Herramienta Online Gratis">
    <meta property="og:description" content="Convierte archivos entre múltiples formatos. Imágenes, documentos y más. Rápido, fácil y sin servidor.">
    <meta property="og:type" content="website">
    <title>Conversor de Archivos - Convierte Imágenes, PDF y Documentos Online Gratis</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: linear-gradient(135deg, #1a1f3a 0%, #2d2e4f 100%);
            border-radius: 20px;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.4);
            padding: 50px;
            max-width: 520px;
            width: 100%;
            border: 1px solid rgba(102, 126, 234, 0.2);
        }

        h1 {
            color: #ffffff;
            text-align: center;
            margin-bottom: 35px;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .section {
            margin-bottom: 28px;
        }

        label {
            display: block;
            color: #e2e8f0;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 14px;
            letter-spacing: 0.3px;
        }

        input[type="file"] {
            display: block;
            width: 100%;
            padding: 14px;
            border: 2px dashed #667eea;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            background-color: rgba(102, 126, 234, 0.1);
            transition: all 0.3s ease;
            color: #cbd5e0;
        }

        input[type="file"]:hover {
            border-color: #764ba2;
            background-color: rgba(102, 126, 234, 0.15);
        }

        input[type="file"]:active {
            border-color: #667eea;
            background-color: rgba(102, 126, 234, 0.2);
        }

        select {
            width: 100%;
            padding: 13px;
            border: 1.5px solid #667eea;
            border-radius: 12px;
            font-size: 14px;
            cursor: pointer;
            background-color: rgba(102, 126, 234, 0.1);
            color: #e2e8f0;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        select:hover {
            border-color: #764ba2;
            background-color: rgba(102, 126, 234, 0.15);
        }

        select:focus {
            outline: none;
            border-color: #667eea;
            background-color: rgba(102, 126, 234, 0.12);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }

        select option {
            background-color: #1a1f3a;
            color: #e2e8f0;
            padding: 8px;
        }

        select optgroup {
            background-color: #1a1f3a;
            color: #667eea;
            font-weight: bold;
        }

        select optgroup option {
            color: #cbd5e0;
        }

        .file-info {
            background: rgba(102, 126, 234, 0.15);
            padding: 14px;
            border-radius: 12px;
            border: 1px solid rgba(102, 126, 234, 0.3);
            margin-top: 12px;
            font-size: 13px;
            color: #cbd5e0;
            display: none;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .file-info.show {
            display: block;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 35px;
        }

        button {
            flex: 1;
            padding: 13px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        .btn-convert {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.2);
        }

        .btn-convert:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }

        .btn-convert:active:not(:disabled) {
            transform: translateY(-1px);
        }

        .btn-convert:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-download {
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(72, 187, 120, 0.2);
        }

        .btn-download:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(72, 187, 120, 0.3);
        }

        .btn-download:active:not(:disabled) {
            transform: translateY(-1px);
        }

        .btn-download:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .message {
            text-align: center;
            padding: 14px;
            border-radius: 12px;
            margin-top: 18px;
            font-size: 13px;
            display: none;
            animation: slideDown 0.3s ease;
            font-weight: 500;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: linear-gradient(135deg, #c6f6d5 0%, #bbf7d0 100%);
            color: #22543d;
            border: 1px solid #9ae6b4;
        }

        .message.error {
            background: linear-gradient(135deg, #fed7d7 0%, #fc8181 100%);
            color: #742a2a;
            border: 1px solid #fc8181;
        }

        .format-category {
            font-weight: bold;
            color: #2d3748;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 35px;
                max-width: 90%;
            }

            h1 {
                font-size: 28px;
                margin-bottom: 30px;
            }

            label {
                font-size: 13px;
            }

            button {
                padding: 12px;
                font-size: 13px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 15px;
            }

            .container {
                padding: 25px;
                border-radius: 16px;
            }

            h1 {
                font-size: 24px;
                margin-bottom: 22px;
            }

            .section {
                margin-bottom: 20px;
            }

            label {
                font-size: 12px;
                margin-bottom: 8px;
            }

            input[type="file"],
            select {
                padding: 11px;
                font-size: 13px;
            }

            .button-group {
                gap: 8px;
                margin-top: 25px;
            }

            button {
                padding: 11px;
                font-size: 12px;
                letter-spacing: 0.4px;
            }

            .file-info {
                font-size: 12px;
                padding: 10px;
            }

            .message {
                font-size: 12px;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Conversor de Archivos</h1>

        <div class="section">
            <label for="fileInput">Selecciona un archivo:</label>
            <input type="file" id="fileInput">
            <div class="file-info" id="fileInfo"></div>
        </div>

        <div class="section">
            <label for="formatSelect">Convertir a:</label>
            <select id="formatSelect">
                <option value="">-- Selecciona un formato --</option>
                
                <optgroup label="📷 IMÁGENES">
                    <option value="png">PNG</option>
                    <option value="jpg">JPG/JPEG</option>
                    <option value="webp">WebP</option>
                    <option value="bmp">BMP</option>
                    <option value="gif">GIF</option>
                </optgroup>

                <optgroup label="📄 DOCUMENTOS">
                    <option value="pdf">PDF</option>
                    <option value="txt">TXT (Texto plano)</option>
                </optgroup>
            </select>
        </div>

        <div class="message" id="message"></div>

        <div class="button-group">
            <button class="btn-convert" id="convertBtn">Convertir</button>
            <button class="btn-download" id="downloadBtn" disabled>Descargar</button>
        </div>
    </div>

    <script>
        let uploadedFile = null;
        let convertedData = null;
        let convertedFileName = null;

        const fileInput = document.getElementById('fileInput');
        const formatSelect = document.getElementById('formatSelect');
        const convertBtn = document.getElementById('convertBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const fileInfo = document.getElementById('fileInfo');
        const message = document.getElementById('message');

        // Manejar carga de archivo
        fileInput.addEventListener('change', (e) => {
            uploadedFile = e.target.files[0];
            if (uploadedFile) {
                fileInfo.textContent = `📁 ${uploadedFile.name} (${(uploadedFile.size / 1024).toFixed(2)} KB)`;
                fileInfo.classList.add('show');
                convertedData = null;
                downloadBtn.disabled = true;
                hideMessage();
            }
        });

        const conversionRules = {
            png: ['png','jpg','jpeg','webp','bmp','gif','pdf','txt'],
            jpg: ['png','jpg','jpeg','webp','bmp','gif','pdf','txt'],
            jpeg: ['png','jpg','jpeg','webp','bmp','gif','pdf','txt'],
            webp: ['png','jpg','jpeg','webp','bmp','gif','pdf','txt'],
            bmp: ['png','jpg','jpeg','webp','bmp','gif','pdf','txt'],
            gif: ['png','jpg','jpeg','webp','bmp','gif','pdf','txt'],
            pdf: ['pdf','txt'],
            txt: ['txt','pdf'],
            html: ['txt','pdf'],
            htm: ['txt','pdf']
        };

        function getFileExtension(name) {
            return (name.split('.').pop() || '').toLowerCase();
        }

        // Convertir archivo
        convertBtn.addEventListener('click', async () => {
            if (!uploadedFile) {
                showMessage('Por favor, selecciona un archivo', 'error');
                return;
            }

            const targetFormat = formatSelect.value;
            if (!targetFormat) {
                showMessage('Por favor, selecciona un formato de destino', 'error');
                return;
            }

            const ext = getFileExtension(uploadedFile.name);
            const validTargets = conversionRules[ext];
            if (!validTargets || !validTargets.includes(targetFormat)) {
                showMessage(`No es posible convertir .${ext} a ${targetFormat}. Selecciona un archivo compatible.`, 'error');
                return;
            }

            convertBtn.disabled = true;
            showMessage('Convirtiendo...', 'success');

            try {
                await convertFile(uploadedFile, targetFormat);
                showMessage('✓ Archivo convertido exitosamente', 'success');
                downloadBtn.disabled = false;
            } catch (error) {
                showMessage('✗ Error: ' + error.message, 'error');
                downloadBtn.disabled = true;
            } finally {
                convertBtn.disabled = false;
            }
        });

        // Descargar archivo convertido
        downloadBtn.addEventListener('click', () => {
            if (!convertedData || !convertedFileName) {
                showMessage('No hay archivo para descargar', 'error');
                return;
            }

            const link = document.createElement('a');
            if (convertedData instanceof Blob) {
                link.href = URL.createObjectURL(convertedData);
            } else {
                link.href = convertedData;
            }
            link.download = convertedFileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        // Función principal de conversión
        async function convertFile(file, targetFormat) {
            const reader = new FileReader();

            return new Promise((resolve, reject) => {
                reader.onload = async (e) => {
                    try {
                        const fileContent = e.target.result;
                        const originalName = file.name.split('.')[0];

                        // Conversiones de imágenes
                        if (['png', 'jpg', 'webp', 'bmp', 'gif'].includes(targetFormat)) {
                            await convertImage(file, targetFormat, originalName);
                        }
                        // Conversiones de documentos
                        else if (targetFormat === 'pdf') {
                            await convertToPDF(file, originalName);
                        }
                        else if (targetFormat === 'txt') {
                            convertToTXT(fileContent, originalName);
                        }

                        resolve();
                    } catch (error) {
                        reject(error);
                    }
                };

                if (['png', 'jpg', 'jpeg', 'gif', 'webp', 'bmp'].includes(file.type.split('/')[1]?.toLowerCase() || '')) {
                    reader.readAsArrayBuffer(file);
                } else {
                    reader.readAsText(file);
                }
            });
        }

        // Convertir imagen
        async function convertImage(file, targetFormat, originalName) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);

                    canvas.toBlob((blob) => {
                        convertedData = blob;
                        convertedFileName = `${originalName}.${targetFormat}`;
                        resolve();
                    }, `image/${targetFormat === 'jpg' ? 'jpeg' : targetFormat}`, 0.95);
                };
                img.onerror = () => reject(new Error('No se pudo cargar la imagen'));
                img.src = URL.createObjectURL(file);
            });
        }

        // Convertir a PDF
        function convertToPDF(file, originalName) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const content = e.target.result;
                const element = document.createElement('div');
                element.innerHTML = content;
                
                const opt = {
                    margin: 10,
                    filename: `${originalName}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2 },
                    jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
                };

                html2pdf().set(opt).from(element).save();
                convertedFileName = `${originalName}.pdf`;
                convertedData = true;
            };
            reader.readAsText(file);
        }

        // Convertir a texto
        function convertToTXT(content, originalName) {
            convertedData = new Blob([content], { type: 'text/plain;charset=utf-8' });
            convertedFileName = `${originalName}.txt`;
        }

        function showMessage(text, type) {
            message.textContent = text;
            message.classList.add('show', type);
            message.classList.remove(type === 'success' ? 'error' : 'success');
        }

        function hideMessage() {
            message.classList.remove('show');
        }
    </script>
</body>
</html>
